<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shark's corner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated background stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: #ffffff;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .welcome-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            background: linear-gradient(45deg, #00d4ff, #ff00ff, #00ff88, #ffaa00);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite, glitch 2s infinite;
            margin-bottom: 1rem;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
        }

        .subtitle {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #a0a0a0;
            margin-bottom: 2rem;
            animation: fadeInUp 1s ease 0.5s both;
        }

        .code-rain {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            height: 100px;
            overflow: hidden;
            margin: 2rem 0;
            position: relative;
        }

        .code-line {
            position: absolute;
            white-space: nowrap;
            animation: fall linear infinite;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        @keyframes fall {
            0% {
                transform: translateY(-100%);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh);
                opacity: 0;
            }
        }

        .cta-button {
            background: linear-gradient(45deg, #ff00ff, #00d4ff);
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3);
            animation: pulse 2s infinite;
            font-family: 'Orbitron', monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.4);
            background: linear-gradient(45deg, #00d4ff, #ff00ff);
        }

        @keyframes pulse {
            0% { box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3); }
            50% { box-shadow: 0 10px 30px rgba(0, 212, 255, 0.6); }
            100% { box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3); }
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
            width: 100%;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            transition: all 0.3s ease;
            animation: fadeInUp 1s ease 1s both;
        }

        .feature-card:hover {
            transform: translateY(-10px);
            border-color: #00d4ff;
            box-shadow: 0 20px 40px rgba(0, 212, 255, 0.2);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .code-rain {
                height: 80px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <div class="container">
        <h1 class="welcome-title">Welcome, traveler! 👨‍💻</h1>
        <p class="subtitle">To my humble abode</p>
        
        <div class="code-rain" id="codeRain"></div>
        
        
    </div>

    <script>
        // Create twinkling stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                starsContainer.appendChild(star);
            }
        }

        // Create falling code rain
        function createCodeRain() {
            const codeRain = document.getElementById('codeRain');
            const codeLines = [
                'console.log("Hello World!");',
                'function code() { return awesome; }',
                'const future = await tomorrow();',
                'if (coding) { happiness++ }',
                'for(;;) { innovate(); }',
                'let dreams = Infinity;',
                'debug() => success;',
                'while(true) { create(); }'
            ];

            setInterval(() => {
                const codeLine = document.createElement('div');
                codeLine.className = 'code-line';
                codeLine.textContent = codeLines[Math.floor(Math.random() * codeLines.length)];
                codeLine.style.left = Math.random() * 100 + '%';
                codeLine.style.animationDuration = (Math.random() * 3 + 2) + 's';
                
                codeRain.appendChild(codeLine);
                
                setTimeout(() => {
                    codeLine.remove();
                }, 5000);
            }, 300);
        }

        function startCoding() {
            // Fun easter egg!
            const button = event.target;
            button.textContent = 'Loading...';
            button.style.transform = 'scale(0.95)';
            
            setTimeout(() => {
                button.innerHTML = '💻 <br> <strong>CODE EDITOR<br>OPENED!</strong>';
                button.style.padding = '2rem';
                
                setTimeout(() => {
                    window.open('https://codepen.io/pen/', '_blank');
                    button.textContent = '🚀 Start Coding Now!';
                    button.style.padding = '1rem 2.5rem';
                }, 2000);
            }, 500);
        }

        // Initialize
        window.addEventListener('load', () => {
            createStars();
            createCodeRain();
        });
    </script>
</body>
</html>
